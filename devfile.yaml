schemaVersion: 2.2.0
metadata:
  name: cable-inventory
  version: 1.0.0
  description: Audio cable inventory app

components:
  - name: tools
    container:
      image: registry.redhat.io/devspaces/udi-rhel8:latest
      memoryLimit: 512Mi
      mountSources: true
      endpoints:
        - name: http-8080
          targetPort: 8080
          protocol: http
          exposure: public

commands:
  - id: serve
    exec:
      label: "Serve"
      component: tools
      commandLine: python3 -m http.server 8080
      workingDir: ${PROJECT_SOURCE}
